# NOTE: This is experimental and might change in the future!

# Exposes GraphQL queries retrieve GUAC graph connectivity data

# TODO: This is returning everything but maybe we need less?
query Path($subject: ID!, $target: ID!, $maxPathLength: Int!) {
  path(subject: $subject, target: $target, maxPathLength: $maxPathLength) {
    __typename
    id
  }
}

# TODO: This is returning everything but maybe we need less?
query Neighbors($node: ID!) {
  neighbors(node: $node) {
    __typename
    ... on Package {
      ... allPkgTree
    }
    ... on Source {
      ... allSourceTree
    }
  }
}
