type Package {
  id: ID!
  type: String!
  namespaces: [PackageNamespace!]!
}

type PackageNamespace {
  id: ID!
  namespace: String!
  names: [PackageName!]!
}

type PackageName {
  id: ID!
  name: String!
  versions: [PackageVersion!]!
  source: Source
}

type PackageVersion {
  id: ID!
  version: String!
  subpath: String!
  source: Source
}

type Source {
  id: ID!
  type: String!
  namespaces: [SourceNamespace!]!
}

type SourceNamespace {
  id: ID!
  namespace: String!
  names: [SourceName!]!
}

type SourceName {
  id: ID!
  name: String!
  tag: String
  commit: String
  package: Package
}

type HasSourceAt {
  id: ID!
  package: Package!
  source: Source!
  justification: String!
}

input PackageFilter {
  id: ID
  type: String
  namespace: String
  name: String
  version: String
  subpath: String
}

input SourceFilter {
  id: ID
  type: String
  namespace: String
  name: String
  tag: String
  commit: String
}

input HasSourceAtFilter {
  id: ID
  package: PackageFilter
  source: SourceFilter
  justification: String
}

input PackageInput {
  type: String!
  namespace: String = ""
  name: String!
  version: String = ""
  subpath: String = ""
}

input SourceInput {
  type: String!
  namespace: String!
  name: String!
  tag: String = ""
  commit: String = ""
}

input HasSourceAtInput {
  justification: String!
}

extend type Query {
  packages(filter: PackageFilter!): [Package!]!
  sources(filter: SourceFilter!): [Source!]!
  sourceMap(filter: HasSourceAtFilter!): [HasSourceAt!]!
}

extend type Mutation {
  ingestPackage(input: PackageInput!): Package!
  ingestSource(input: SourceInput!): Source!
  ingestSourceAt(package: PackageInput!, source: SourceInput!, input: HasSourceAtInput!): HasSourceAt!
}
