# Where is the server schema defined?
schema:
  - ../server/graphql/schema/*.graphql

# Where are the operations (client query docs) defined?
operations:
  - operations/*.graphql

# Where does the generated code?
generated: generated/operations.go
package: generated

# Generate pointers for optional values instead of defaults.
# We use "" to signal match for exactly empty string or nil, so we need to use
# pointers.
optional: pointer
